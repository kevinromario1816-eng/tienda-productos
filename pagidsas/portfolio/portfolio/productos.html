<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda – Kevin Rovira</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="main-header">
    <div class="container header-inner">
        <a href="index.html" class="logo">KR</a>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#sobre">Sobre mí</a></li>
                <li><a href="index.html#proyectos">Proyectos</a></li>
                <li><a href="productos.html" class="nav-active">Tienda</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
                <li><a href="mascotas.html" class="nav-accent">🐾 Mascotas</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" id="menu-toggle" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<section class="page-hero">
    <div class="container">
        <p class="hero-eyebrow">Catálogo</p>
        <h1 class="page-hero-title">Tienda</h1>
        <p class="page-hero-sub">Productos seleccionados con cuidado para ti.</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <!-- Filtros y búsqueda -->
        <div class="store-controls">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar productos...">
            <div class="filter-group">
                <button class="filter-btn active" data-category="all">Todos</button>
                <button class="filter-btn" data-category="tech">Tecnología</button>
                <button class="filter-btn" data-category="ropa">Ropa</button>
                <button class="filter-btn" data-category="hogar">Hogar</button>
                <button class="filter-btn" data-category="deporte">Deporte</button>
            </div>
        </div>

        <!-- Info resultados -->
        <div class="results-info">
            <span id="results-count"></span>
        </div>

        <!-- Grid de productos -->
        <div class="products-grid" id="products-grid">
            <!-- Renderizado por JS -->
        </div>

        <!-- Paginación -->
        <div class="pagination" id="pagination">
            <button class="page-btn" id="btn-prev" disabled>← Anterior</button>
            <div class="page-numbers" id="page-numbers"></div>
            <button class="page-btn" id="btn-next">Siguiente →</button>
        </div>
    </div>
</section>

<footer>
    <div class="container footer-inner">
        <span class="logo">KR</span>
        <span>© 2025 Kevin Rovira · Portfolio</span>
        <nav class="footer-nav">
            <a href="mascotas.html">Mascotas</a>
            <a href="productos.html">Tienda</a>
        </nav>
    </div>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
